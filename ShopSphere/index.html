<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSphere | Modern E-Commerce</title>

```
<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
```

</head>

<body>

```
<!-- Navbar -->

<header class="navbar">

    <div class="logo">
        🛍️ ShopSphere
    </div>

    <nav>
        <a href="#home">Home</a>
        <a href="#products">Products</a>
        <a href="#cart">Cart</a>
        <a href="#wishlist">Wishlist</a>
        <a href="#contact">Contact</a>
    </nav>

    <button id="themeBtn">
        🌙
    </button>

</header>

<!-- Hero -->

<section class="hero" id="home">

    <div class="hero-content">

        <h1>
            Discover Amazing Products
        </h1>

        <p>
            Shop the latest gadgets, fashion, accessories and more.
        </p>

        <button class="shop-btn">
            Shop Now
        </button>

    </div>

</section>

<!-- Search -->

<section class="search-section">

    <input
        type="text"
        id="searchInput"
        placeholder="Search products..."
    >

</section>

<!-- Categories -->

<section class="categories">

    <button class="category-btn" data-category="All">
        All
    </button>

    <button class="category-btn" data-category="Electronics">
        Electronics
    </button>

    <button class="category-btn" data-category="Fashion">
        Fashion
    </button>

    <button class="category-btn" data-category="Shoes">
        Shoes
    </button>

    <button class="category-btn" data-category="Accessories">
        Accessories
    </button>

</section>

<!-- Products -->

<section id="products">

    <h2 class="section-title">
        Featured Products
    </h2>

    <div
        id="productContainer"
        class="product-grid">

    </div>

</section>

<!-- Cart -->

<section id="cart">

    <h2 class="section-title">
        Shopping Cart
    </h2>

    <div id="cartItems">

    </div>

</section>

<!-- Wishlist -->

<section id="wishlist">

    <h2 class="section-title">
        Wishlist
    </h2>

    <div id="wishlistItems">

    </div>

</section>

<!-- Contact -->

<section
    id="contact"
    class="contact-section">

    <h2>
        Contact Us
    </h2>

    <form>

        <input
            type="text"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            placeholder="Your Email"
            required
        >

        <textarea
            rows="5"
            placeholder="Message"
            required>
        </textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

<!-- Footer -->

<footer>

    <p>
        © 2026 ShopSphere. All Rights Reserved.
    </p>

</footer>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>
```

</body>

</html>
